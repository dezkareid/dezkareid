name: Deploy Apps
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "apps/**"
    branches:
      - main
  push:
    paths:
      - "apps/**"
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup JS
        uses: ./.github/actions/setup-js

      - name: Testing
        run: pnpm run test

  check-changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.changes }}
      configuration: ${{ toJson(steps.filter.outputs) }}
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Paths Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: json
          filters: .github/apps.yml

  deploy:
    needs: [test, check-changes]
    # Only run deploy if there are changes and it's either a PR or a push to main
    if: needs.check-changes.outputs.apps != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.check-changes.outputs.apps) }}
      fail-fast: false
    env:
      APP_KEY: ${{ matrix.app }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup JS
        uses: ./.github/actions/setup-js

      - name: Get app information
        run: |
          export JSON_DATA='${{ needs.check-changes.outputs.configuration }}'
          APP_FILES="${APP_KEY}_files"
          # Get the first file from the filter to derive the app path
          APP_PATH_DATA=$(echo $JSON_DATA | jq -r --arg key "$APP_FILES" '.[$key] | fromjson[0]')
          APP_PATH=$(echo $APP_PATH_DATA | cut -d'/' -f1-2)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          
          # Get the full package name for turbo filtering and CF project name
          cd ./${APP_PATH}
          FULL_APP_NAME=$(node -e "console.log(require('./package.json').name)")
          echo "FULL_APP_NAME=$FULL_APP_NAME" >> $GITHUB_ENV
          
          # Extract project name without scope for Cloudflare
          CF_PROJECT=$(node -e "console.log(require('./package.json').name.split('/').pop())")
          echo "CLOUDFLARE_PROJECT=$CF_PROJECT" >> $GITHUB_ENV

      - name: Build
        run: pnpm build --filter=${{ env.FULL_APP_NAME }}
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@3.90.0 pages deploy ${{ env.APP_PATH }}/dist --project-name=${{ env.CLOUDFLARE_PROJECT }} --branch=${{ github.head_ref || github.ref_name }} --create-if-missing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
